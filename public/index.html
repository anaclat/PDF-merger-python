<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger - Mescle seus PDFs facilmente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #f8f9ff;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background-color: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background-color: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #666;
            font-size: 1em;
            margin: 10px 0;
        }

        .upload-area strong {
            color: #667eea;
        }

        #fileInput {
            display: none;
        }

        .files-list {
            margin-bottom: 30px;
            max-height: 300px;
            overflow-y: auto;
        }

        .file-item {
            background: #f8f9ff;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .file-item-name {
            color: #333;
            font-weight: 500;
            flex: 1;
            word-break: break-all;
        }

        .file-item-remove {
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s ease;
        }

        .file-item-remove:hover {
            background: #ee5a52;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: #667eea;
            color: white;
        }

        .btn-add:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-merge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-merge:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-merge:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: #0c5460;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .file-count {
            text-align: center;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 15px;
        }

        .file-count strong {
            color: #667eea;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 30px 15px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>PDF Merger</h1>
            <p>Mescle múltiplos PDFs em um único arquivo</p>
        </div>

        <div id="status" class="status"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <p><strong>Clique aqui</strong> ou arraste arquivos PDF</p>
            <p style="font-size: 0.9em; color: #999;">Apenas arquivos .pdf são aceitos</p>
        </div>

        <input type="file" id="fileInput" multiple accept=".pdf">

        <div class="file-count" id="fileCount"></div>

        <div class="files-list" id="filesList"></div>

        <div class="button-group">
            <button class="btn-add" id="btnAdd">+ Adicionar PDFs</button>
            <button class="btn-clear" id="btnClear">Limpar</button>
        </div>

        <button class="btn-merge" id="btnMerge" disabled>Mesclar PDFs</button>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const btnAdd = document.getElementById('btnAdd');
        const btnClear = document.getElementById('btnClear');
        const btnMerge = document.getElementById('btnMerge');
        const status = document.getElementById('status');
        const fileCount = document.getElementById('fileCount');

        let selectedFiles = [];

        // Configurar eventos de upload
        uploadArea.addEventListener('click', () => fileInput.click());
        btnAdd.addEventListener('click', () => fileInput.click());
        btnClear.addEventListener('click', clearFiles);
        btnMerge.addEventListener('click', mergeFiles);

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Selecionar arquivos
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.type === 'application/pdf') {
                    selectedFiles.push(file);
                } else {
                    showStatus(`Arquivo "${file.name}" não é um PDF válido.`, 'error');
                }
            }
            updateFilesList();
        }

        function updateFilesList() {
            filesList.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                fileCount.textContent = '';
                btnMerge.disabled = true;
                return;
            }

            fileCount.textContent = `${selectedFiles.length} arquivo(s) selecionado(s)`;
            btnMerge.disabled = false;

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span class="file-item-name">${index + 1}. ${file.name}</span>
                    <button class="file-item-remove" onclick="removeFile(${index})">Remover</button>
                `;
                filesList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFilesList();
        }

        function clearFiles() {
            selectedFiles = [];
            fileInput.value = '';
            updateFilesList();
            hideStatus();
        }

        async function mergeFiles() {
            if (selectedFiles.length === 0) {
                showStatus('Selecione pelo menos um arquivo PDF.', 'error');
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });

            btnMerge.disabled = true;
            showStatus('<span class="spinner"></span>Mesclando PDFs...', 'loading');

            try {
                // Usar rota relativa para funcionar tanto local quanto na Vercel
                const response = await fetch('/api/merge', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Erro ao mesclar PDFs');
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged_pdf.pdf';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                showStatus('✓ PDFs mesclados com sucesso!', 'success');
                clearFiles();
            } catch (error) {
                showStatus(`Erro: ${error.message}`, 'error');
            } finally {
                btnMerge.disabled = selectedFiles.length === 0;
            }
        }

        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
        }

        function hideStatus() {
            status.className = 'status';
        }
    </script>
</body>
</html>
